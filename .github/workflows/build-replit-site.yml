name: Build Replit Website ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build frontend
        env:
          BASE_PATH: /
          PORT: 3000
        run: ./artifacts/truenewsscanner/node_modules/.bin/vite build --config artifacts/truenewsscanner/vite.config.ts

      - name: Create ZIP from static site output
        run: |
          cd artifacts/truenewsscanner/dist/public
          zip -r "$GITHUB_WORKSPACE/site-build.zip" .

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site-build.zip
