name: Build Replit Website ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        run: |
          cd artifacts/truenewsscanner
          npm install

      - name: Build frontend
        run: |
          cd artifacts/truenewsscanner
          npm run build

      - name: Create ZIP from dist
        run: |
          cd artifacts/truenewsscanner
          zip -r ../../site-build.zip dist

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site-build.zip
