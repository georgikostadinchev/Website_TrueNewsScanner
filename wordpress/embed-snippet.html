<!--
  TrueNewsScanner — Embed Snippet
  ================================
  Копирайте кода по-долу и го поставете в HTML секцията на вашия сайт,
  WordPress Customizer > Additional CSS / HTML, или директно в страница чрез блок "Custom HTML".

  Заменете YOUR_APP_URL с истинския URL на вашето TrueNewsScanner приложение.
-->

<!-- TrueNewsScanner Embed: Пълна страница (препоръчително) -->
<div style="width:100%;overflow:hidden;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.10);">
  <iframe
    src="YOUR_APP_URL"
    style="width:100%;height:680px;border:none;display:block;"
    loading="lazy"
    title="TrueNewsScanner — Проверка за измами и дезинформация"
  ></iframe>
</div>

<!-- ============================================================ -->
<!-- TrueNewsScanner Embed: Само формулярът (компактен вариант) -->
<!-- ============================================================ -->
<div style="width:100%;overflow:hidden;border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,0.10);">
  <iframe
    src="YOUR_APP_URL?embed=1"
    style="width:100%;height:420px;border:none;display:block;"
    loading="lazy"
    title="TrueNewsScanner"
  ></iframe>
</div>
