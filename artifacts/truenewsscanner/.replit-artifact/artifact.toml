kind = "web"
previewPath = "/"
title = "TrueNewsScanner"
version = "1.0.0"
id = "artifacts/truenewsscanner"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26093

[services.development]
run = "pnpm --filter @workspace/truenewsscanner run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/truenewsscanner", "run", "build" ]
publicDir = "artifacts/truenewsscanner/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26093"
BASE_PATH = "/"
